<!DOCTYPE html>
<html>
<head>
  <title>Number Guessing Game</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: lightgray;
      padding: 50px;
    }

    .box {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background-color: darkblue;
      color: white;
      border: none;
      border-radius: 5px;
    }

    input {
      padding: 8px;
      width: 80%;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Guess the Number</h1>
  <p>Pick a number between 1 and 20</p>

  <input type="number" id="guess">
  <br>
  <button onclick="checkGuess()">Submit</button>

  <p id="message"></p>
  <p id="attempts"></p>
</div>

<script>
  let number = Math.floor(Math.random() * 20) + 1;
  let tries = 0;

  function checkGuess() {
    let guess = document.getElementById("guess").value;
    tries++;

    if (guess == number) {
      document.getElementById("message").innerText = "🎉 Correct!";
    } 
    else if (guess < number) {
      document.getElementById("message").innerText = "Too low!";
    } 
    else {
      document.getElementById("message").innerText = "Too high!";
    }

    document.getElementById("attempts").innerText = "Attempts: " + tries;
  }
</script>

</body>
</html>
